# lefthook.yml — git hooks orchestration (§6.4). Single org standard, Copier-synced.
#
# Hook activation note: lefthook installs into .git/hooks/ by default. If a
# developer's global `core.hooksPath` points at a dispatcher (the org's
# chezmoi-managed ~/.config/git/hooks pattern), the dispatcher delegates to the
# per-repo lefthook binary via its own logic. No repo-side `core.hooksPath`
# override is required or wanted — repo-local `.githooks/` directories are
# banned by `check.sh` to keep the dispatcher path canonical across the fleet.

commit-msg:
  commands:
    commitlint:
      # `{1}` is lefthook's positional placeholder for the commit-message file
      # path under git's native commit-msg invocation. lint-hooks CI exercises
      # the same hook via `lefthook run commit-msg --files <path>`, where
      # lefthook substitutes `{staged_files}` instead and leaves `{1}` literal.
      # The shell wrapper below resolves whichever placeholder lefthook filled.
      #
      # commitlint + @commitlint/config-conventional are pinned via mise's
      # `npm:` backend (see .mise.toml.jinja). The two packages land in
      # SIBLING install dirs, so cosmiconfig's `resolveExtends` cannot find
      # `@commitlint/config-conventional` from the cli's resolution roots.
      # Setting NODE_PATH to the config-conventional install dir makes Node's
      # resolver find it. The previous TS-only `npx --no -- commitlint` path
      # required commitlint as a package.json devDep, but Pattern E preserves
      # the consumer's package.json (`_skip_if_exists`) so the assumption
      # broke. Using mise + NODE_PATH gives a universal, archetype-agnostic
      # invocation.
      run: |
        mise exec -- sh -c '
          f="$1"
          case "$f" in (""|"{"*) f="$2";; esac
          case "$f" in (""|"{"*) echo "no commit-msg file resolved" >&2; exit 1;; esac
          conf_dir=$(mise where npm:@commitlint/config-conventional 2>/dev/null)/lib/node_modules
          NODE_PATH="${NODE_PATH:+$NODE_PATH:}$conf_dir" exec commitlint --edit "$f"
        ' _ "{1}" "{staged_files}"

pre-commit:
  parallel: true
  commands:
    gitleaks:
      # `gitleaks git` takes an optional positional [repo] arg, NOT --source (which
      # is a `gitleaks detect` flag — that subcommand is what CI uses via
      # secret-scan.yml). The pre-commit hook here uses the `git` subcommand with
      # the implicit cwd as `[repo]`. The earlier template invocation included a
      # bogus `--source .` which made gitleaks >= 8.x error out with
      # `unknown flag: --source` on every commit. CI was unaffected (different
      # subcommand). Reproduced under gitleaks 8.30.1.
      run: gitleaks git --staged --redact --no-banner

    gofmt:
      glob: "*.go"
      # `gofmt` ships with go itself (mise installs go via .tool-versions) so
      # the standard PATH activation reaches it.
      run: mise exec -- gofmt -w {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "*.go"
      # `mise exec --` prefix is required: git's commit-hook subshell loses
      # mise's PATH activation, so a bare `golangci-lint` errors with
      # "command not found". The other hooks that resolve through mise's
      # aqua/npm backends already use this pattern; the template's go-archetype
      # block omits it (template-bug — fix upstream separately).
      run: mise exec -- golangci-lint run --new-from-rev=HEAD --fix
      stage_fixed: true

    markdownlint:
      glob: "*.md"
      run: mise exec -- markdownlint-cli2 {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: mise exec -- yamllint {staged_files}
    yaml-prettier:
      # §4 / §6.1: yamllint catches semantic bugs Prettier can't; Prettier handles formatting.
      glob: "*.{yml,yaml}"
      run: mise exec -- prettier --write {staged_files}
      stage_fixed: true
    shellcheck:
      glob: "*.{sh,bash}"
      run: shellcheck {staged_files}
    shfmt:
      glob: "*.{sh,bash}"
      run: shfmt -w {staged_files}
      stage_fixed: true
    sops-mac-validate:
      # Verify MAC integrity on staged encrypted files; sops --decrypt with no
      # output flag streams plaintext to stdout, so route to /dev/null and
      # rely on exit code only.
      glob: "*.enc.{yaml,json,env}"
      run: |
        for f in {staged_files}; do sops --decrypt "$f" >/dev/null || exit 1; done

pre-push:
  commands:
    audit:
      # Run the deterministic audit before push so drift is caught locally.
      # `.standards/` is only ever materialized in CI by audit.yml's pinned
      # checkout — locally the dir doesn't exist, so skipping silently turns
      # this hook into a noisy "command not found" on every push. Guard the
      # invocation so the local pre-push stays quiet (CI is the gate).
      run: |
        if [ -d .standards ]; then
          bash .standards/scripts/check.sh || true
        else
          echo "pre-push audit skipped — .standards/ only exists in CI (audit.yml's checkout); CI is the gate"
        fi
